<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CEF Debug Browser Placeholder</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0f1f;
        color: #eaf0ff;
        font: 16px/1.5 "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100vw - 40px));
        padding: 32px;
        border: 1px solid rgba(124, 240, 213, 0.2);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CEF Debug Browser</h1>
      <p>
        Placeholder surface for the future embedded CEP DevTools browser.
        Phase 1 stays on the external browser path. Phase 2 can replace this with an embedded Chromium host.
      </p>
    </main>
  </body>
</html>
